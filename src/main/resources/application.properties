# Common
quarkus.package.jar.type=uber-jar
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,X-API-Key
quarkus.http.cors.exposed-headers=Set-Cookie
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.limits.max-body-size=12M

# Jackson
quarkus.jackson.serialization-inclusion=non-null

# Auth cookie
app.auth.cookie-name=lifeapp-session
app.auth.cookie-max-age=-1

# DynamoDB
quarkus.dynamodb.aws.region=us-east-1
quarkus.dynamodb.sync-client.type=url

# SSM
quarkus.ssm.aws.region=us-east-1
quarkus.ssm.sync-client.type=url

# S3
quarkus.s3.aws.region=us-east-1
quarkus.s3.sync-client.type=url

# Dev profile overrides
%dev.quarkus.dynamodb.endpoint-override=http://localhost:8001
%dev.quarkus.dynamodb.aws.credentials.type=static
%dev.quarkus.dynamodb.aws.credentials.static-provider.access-key-id=fakeAccessKey
%dev.quarkus.dynamodb.aws.credentials.static-provider.secret-access-key=fakeSecretKey

%dev.quarkus.ssm.endpoint-override=http://localhost:4583
%dev.quarkus.ssm.aws.credentials.type=static
%dev.quarkus.ssm.aws.credentials.static-provider.access-key-id=fakeAccessKey
%dev.quarkus.ssm.aws.credentials.static-provider.secret-access-key=fakeSecretKey
%dev.quarkus.ssm.enabled=false

%dev.quarkus.s3.endpoint-override=http://localhost:4566
%dev.quarkus.s3.aws.credentials.type=static
%dev.quarkus.s3.aws.credentials.static-provider.access-key-id=fakeAccessKey
%dev.quarkus.s3.aws.credentials.static-provider.secret-access-key=fakeSecretKey
%dev.quarkus.s3.enabled=false

# Dev auth (bypasses SSM)
%dev.app.auth.password-hash=$2a$10$L2mpmay2aZnwsjVlYCg6Pu0yBQnTFweTJZ07aH7JcGtcUPaZMeiBS
%dev.app.auth.api-key=dev-api-key
%dev.app.auth.dev-mode=true

# Dev image storage
%dev.app.images.storage=filesystem
%dev.app.images.filesystem-path=/tmp/lifeapp-images

# Prod image storage
app.images.storage=s3
app.images.s3-bucket=lifeapp-images
